name: Renovate

on:
  schedule:
    - cron: "0 */6 * * *" # 6時間ごと (00/06/12/18 UTC)
  workflow_dispatch:
    inputs:
      logLevel:
        description: Renovate log level
        type: choice
        default: info
        options:
          - info
          - debug

concurrency:
  group: renovate
  cancel-in-progress: false

# Renovate は下で発行する GitHub App トークンで push / PR / status / commit を行う。
# そのためジョブ既定の GITHUB_TOKEN には書き込み権限は不要（read のみ）。
# 実際に必要な権限(contents / pull-requests / issues / statuses など)は App 側で付与する。
permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      # mise バイナリを PATH に置くだけ（ツール本体は不要なので install: false）。
      # これで Renovate が binarySource=global で mise を見つけ、bump 時に mise lock を実行できる。
      - name: Setup mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: false

      # GitHub App トークンを発行する。
      # 既定の GITHUB_TOKEN だと commit status 作成が 422 になり、Renovate が
      # PR 作成前に中断してしまう（status 書き込みエラーを致命扱いするため）。
      # App トークンに切り替えると status / commit が通り、PR も CI 発火する（公式推奨）。
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Run Renovate
        run: npx --yes renovate
        env:
          # GitHub App トークン（PAT 不使用）。push / PR / status / commit に使用。
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
          # mise lock が GitHub API を叩く際のレート制限回避用。
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          RENOVATE_REPOSITORIES: boykush/dotfiles
          # ランナーに入れた mise を使う。
          RENOVATE_BINARY_SOURCE: global
          # mise lock の実行を許可（セルフホスト専用設定）。
          RENOVATE_ALLOWED_UNSAFE_EXECUTIONS: '["mise"]'
          # CI 上の mise プロンプト（trust 等）を自動承認。
          MISE_YES: "1"
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}

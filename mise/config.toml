# mise 自身の下限バージョン。これ未満の mise で実行するとエラーになる（自動更新ではない）。
# 更新は brew upgrade mise。上げたら必要に応じてこの値も追従させる。
min_version = "2026.6.7"

[settings]
experimental = true
lockfile = true
disable_backends = ["npm", "vfox"]

[env]
XDG_CONFIG_HOME = "{{env.HOME}}/.config"
LANG = "ja_JP.UTF-8"
EDITOR = "hx"
BAT_THEME = "Nord"
# Takumi Guard (Flatt Security) の悪意あるパッケージブロックプロキシを npm の既定レジストリにする。
# 匿名利用でもブロックは有効（識別子付与トークンは任意かつ秘密情報のためコミットしない）。env 設定のため
# registry に限りプロジェクト直下 .npmrc の registry も上書きする（@scope:registry= は別キーで影響なし）。
NPM_CONFIG_REGISTRY = "https://npm.flatt.tech/"
# GitHub 認証の既定は gh auth login。その場合 GH_TOKEN は空で、gh は自身の保存トークンを使う。
# ~/.gitconfig.ghtkn がある環境のみ ghtkn の短命トークンを GH_TOKEN に供給する（git も同
# ファイルの include で ghtkn git-credential に切り替わり認証系統が揃う）。実環境変数なので、
# alias を展開しない gh 呼び出し（子プロセス経由）にも伝播する。失効時は ghtkn get が非ゼロ
# 終了するため `|| true` で空にする。再評価は shell 起動/cd/設定変更時のみ。
GH_TOKEN = "{{ exec(command='[ -f $HOME/.gitconfig.ghtkn ] && ghtkn get 2>/dev/null || true') }}"

[tools]
node = "24"

# CLI tools (migrated from brew)
"aqua:sharkdp/bat" = "0.26.1"
"aqua:sharkdp/fd" = "10.4.2"
"aqua:dandavison/delta" = "0.19.2"
"asdf:mise-plugins/mise-eza" = "0.23.4"
"aqua:junegunn/fzf" = "0.73.1"
"aqua:jqlang/jq" = "1.8.1"
"aqua:extrawurst/gitui" = "0.28.1"
"aqua:helix-editor/helix" = "25.07.1"
"aqua:BurntSushi/ripgrep" = "15.1.0"
"aqua:starship/starship" = "1.25.1"
"aqua:ajeetdsouza/zoxide" = "0.9.9"
"aqua:dalance/procs" = "0.14.12"
"aqua:cli/cli" = "2.94.0"
"aqua:suzuki-shunsuke/ghtkn" = "0.3.0" # GitHub App の短命トークン発行（gh auth login の代替）
"aqua:sxyazi/yazi" = "26.5.6"
"aqua:anthropics/claude-code" = "2.1.195"
"aqua:tmux/tmux-builds" = "3.6a"

[shell_alias]
cat = "bat"
vi = "hx"
e = "eza --icons"
ls = "eza --icons"
ea = "eza -a --icons"
la = "eza -a --icons"
ee = "eza -aal --icons -hl --git"
ll = "eza -aal --icons -hl --git"
et = "eza -T -L 3 -a -I 'node_modules|.git|.cache' --icons"
lt = "eza -T -L 3 -a -I 'node_modules|.git|.cache' --icons"
eta = "eza -T -a -I 'node_modules|.git|.cache' --color=always --icons | less -r"
lta = "eza -T -a -I 'node_modules|.git|.cache' --color=always --icons | less -r"
fbr = "mise run fbr"
fkill = "mise run fkill"
gst = "git status -s | awk '{print $2}' | xargs -I {} eza -l --git --icons --no-permissions --no-filesize --no-user --no-time {}"

[hooks]
postinstall = "~/.config/mise/hooks/postinstall.sh"

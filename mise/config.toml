# mise 自身の下限バージョン。これ未満の mise で実行するとエラーになる（version と
# self-update だけは例外的に通る）。renovate が minimum release age 付きで追従し、同じ PR で
# bin/mise の埋込版も一緒に上がる（lockstep。renovate.json 参照）ため、埋込版がこの floor を
# 下回ることはない。日常の最新化は `mise self-update`。
min_version = "2026.7.11"

[settings]
lockfile = true
disable_backends = ["npm", "vfox", "asdf"]
# 新規バージョン解決（mise upgrade 等）をリリース経過日数でフィルタし、リリース直後の版を
# 掴まないようにする。renovate（self-hosted）の release age 3d と同値で、手動経路にも同じ
# クールダウンを効かせる。pin 済み・インストール済みの版はそのまま有効（v2026.7.6 で担保）。
minimum_release_age = "3d"
# dotfiles 機能。[dotfiles] のシンボリックリンクを宣言的に管理する。
# root は `mise dotfiles add` で新規ソースを配置する基準。default_mode=symlink により
# 各エントリは既定でシンボリックリンクになる。
dotfiles.root = "~/dotfiles"
dotfiles.default_mode = "symlink"

[env]
XDG_CONFIG_HOME = "{{env.HOME}}/.config"
LANG = "ja_JP.UTF-8"
EDITOR = "hx"
BAT_THEME = "Nord"
# Takumi Guard (Flatt Security) の悪意あるパッケージブロックプロキシを npm の既定レジストリにする。
# 匿名利用でもブロックは有効（識別子付与トークンは任意かつ秘密情報のためコミットしない）。env 設定のため
# registry に限りプロジェクト直下 .npmrc の registry も上書きする（@scope:registry= は別キーで影響なし）。
NPM_CONFIG_REGISTRY = "https://npm.flatt.tech/"

[tools]
# CLI tools
"aqua:sharkdp/bat" = "0.26.1"
"aqua:sharkdp/fd" = "10.4.2"
"aqua:dandavison/delta" = "0.19.2"
# ls 代替。aqua backend で macOS 向けプリビルドバイナリが入る（他ツールと同様、checksum 検証あり）。
# cargo backend は cargo-binstall の無い環境だと Rust ソースビルドに落ち、新環境で失敗しうるため使わない。
"aqua:lsd-rs/lsd" = "1.2.0"
"aqua:junegunn/fzf" = "0.74.1"
"aqua:jqlang/jq" = "1.8.1"
"aqua:extrawurst/gitui" = "0.28.1"
"aqua:helix-editor/helix" = "25.07.1"
"aqua:BurntSushi/ripgrep" = "15.2.0"
"aqua:starship/starship" = "1.26.0"
"aqua:ajeetdsouza/zoxide" = "0.9.9"
"aqua:dalance/procs" = "0.14.12"
"aqua:cli/cli" = "2.96.0"
"aqua:sxyazi/yazi" = "26.5.6"
"aqua:anthropics/claude-code" = "2.1.211"
"aqua:tmux/tmux-builds" = "3.6a"

# GUI アプリ・フォントを brew-cask backend で宣言的に管理する。`[tools]` と違い自動では入らず、
# `mise bootstrap` 実行時にインストールされる（アプリは /Applications、フォントは ~/Library/Fonts。
# mise 組み込みのインストーラーが Homebrew cask API からメタデータを取得して直接インストールする
# ため brew バイナリは不要。非対応 artifact の cask は brew に委譲されず明確なエラーになる）。
# cask はバージョンを名前で表現し、GUI アプリは自身で自動更新するため latest 固定でよい
# （フォントも cask 追従で足りる）。
[bootstrap.packages]
"brew-cask:arc"       = "latest"
"brew-cask:claude"    = "latest"
"brew-cask:codex-app" = "latest"
"brew-cask:ghostty"   = "latest"
# フォント（ghostty 主フォント）
"brew-cask:font-hack-nerd-font" = "latest"

# dotfiles リポジトリ自身。`mise bootstrap` の repos ステップで clone / 更新する（self-managing。
# 未 clone なら取得、既にあれば ref=main に追従）。dotfiles 適用より前に走る。
[bootstrap.repos]
"~/dotfiles" = { url = "git@github.com:boykush/dotfiles.git", ref = "main" }

# macOS の defaults も宣言管理する。`mise bootstrap` の macos ステップで値の型に応じた
# `defaults write`（-bool / -int 等）が適用され、`mise bootstrap macos defaults status --missing`
# で乖離を機械検証できる。まずはキーボードリピートと Dock の最小セット（現マシンの実値）から。
# 反映は対象プロセスの再読込後（Dock は killall Dock、キーリピートは再ログイン/アプリ再起動）。
[bootstrap.macos.defaults.NSGlobalDomain]
# System Settings のスライダーは real（float）で書くため、型付き比較の status が
# differs にならないよう float で宣言する（int 宣言だと値が同じでも型不一致になる）。
KeyRepeat = 2.0         # キーリピート速度: 最速
InitialKeyRepeat = 15.0 # リピート開始までの遅延: 最短
# 長押しでアクセント記号ピッカーを出さずキーリピートさせる（エディタのカーソル移動向け）
ApplePressAndHoldEnabled = false

[bootstrap.macos.defaults."com.apple.dock"]
autohide = true

[shell_alias]
cat = "bat"
vi = "hx"
# lsd は既定で icon=auto（TTY 時のみアイコン表示）なのでアイコン用フラグは明示しない。
# 除外は -I 'a|b|c'（パイプ区切り）が使えないため -I を個別に列挙する。
la = "lsd -a"
ll = "lsd -al --git"
lt = "lsd --tree --depth 3 -a -I node_modules -I .git -I .cache"
lta = "lsd --tree -a -I node_modules -I .git -I .cache --color always | less -r"
fbr = "mise run fbr"
fkill = "mise run fkill"
# 特定の表示列だけを無効化するオプションが無いため、--blocks で表示する列
# （git ステータスと名前のみ）を明示する。
gst = "git status -s | awk '{print $2}' | xargs -I {} lsd -l --git --blocks git,name {}"

# dotfiles のシンボリックリンク定義。`[tools]` と違い自動では張られず、
# `mise dotfiles apply` の明示実行時のみ適用される。値はソースパス（~ 展開あり）。
# ディレクトリ指定はそのディレクトリごと symlink する。
[dotfiles]
# mise 設定自身（global config の実体）。bin/mise をリポジトリ内で実行すると
# mise/config.toml がローカル config として読まれるので、この自己リンクも
# `mise dotfiles apply` で張れる。
"~/.config/mise" = "~/dotfiles/mise"
# ホーム直下
# --- 対話シェル初期化（~/.zshrc）: whole-file symlink ではなく block-edit で宣言管理する ---
# 順序が重要: activate が mise のツールを PATH に通すので必ず先頭。zoxide/starship はその後で
# ないとバイナリが未解決になる。login(.zprofile) でなく rc に置くのは Codex.app 等の non-login
# interactive shell でも効かせるため。※ mise 純正の [bootstrap.mise_shell_activate] は使わない
# （activate 行しか書けず zoxide/starship を管理できない上、bootstrap のステップ順で activate が
# 末尾に回り順序が壊れるため。block-edit なら宣言順で activate を先頭に固定できる）。
# activate は bin/mise（bootstrap ラッパー）を絶対パスで参照する（mise 公式の
# `eval "$(~/.local/bin/mise activate zsh)"` と同型）。PATH の事前設定が不要になるため
# ~/.zshenv は管理しない。効果範囲: 対話シェルでは mise は関数・ツールは実 PATH に入り、
# 子プロセス（Claude Code 等）へはツールの PATH だけ継承される（bare `mise` は不可視）。
# シェル初期化を経ないスクリプト・エージェントが mise を呼ぶときは ~/dotfiles/bin/mise を
# 絶対パスで叩く（[env] も適用される）。mise 純正の非対話サポートが入ったら移行する。
"~/.zshrc/activate" = { block = 'eval "$(~/dotfiles/bin/mise activate zsh)"' }
"~/.zshrc/zoxide"   = { block = 'eval "$(zoxide init zsh)"' }
"~/.zshrc/starship" = { block = 'eval "$(starship init zsh)"' }
"~/.gitconfig" = "~/dotfiles/.gitconfig"
"~/.tmux.conf" = "~/dotfiles/tmux/tmux.conf"
# ~/.config 配下（ディレクトリごと）
"~/.config/git"     = "~/dotfiles/git"
"~/.config/ghostty" = "~/dotfiles/ghostty"
"~/.config/gitui"   = "~/dotfiles/gitui"
"~/.config/helix"   = "~/dotfiles/helix"
# ~/.claude 配下（Claude Code。hooks はディレクトリごと）
# 注: 旧スクリプトには skills の行もあったが、ソース ~/dotfiles/claude-code/skills が
# 実在せず（＝旧 ln は dangling を生むだけで機能していなかった）、~/.claude/skills は
# Claude Code 自身が管理する実ディレクトリのため dotfiles では扱わない。
"~/.claude/settings.json"   = "~/dotfiles/claude-code/settings.json"
"~/.claude/statusline.sh"   = "~/dotfiles/claude-code/statusline.sh"
"~/.claude/claude-dev.json" = "~/dotfiles/claude-code/claude-dev.json"
"~/.claude/hooks"           = "~/dotfiles/claude-code/hooks"
